<!DOCTYPE html>
<html lang="de">
<link rel="stylesheet" href="css/style.css">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <header>
        <img src="img/logo.png" alt="THW Logo">
        <br>
        <h1>Förderverein THW Steinau</h1>
    </header>
    <title>Events</title>
</head>

<body>

    <h1>Veranstaltung</h1>
    <button onclick="window.location.href='eventadd.html'">
        Neue Veranstaltung
    </button>
    <button id="adminBtn" onclick="window.location.href='eventsdelete.html'">
        Veranstaltung löschen
    </button>
    
    <button onclick="window.location.href='index.html'">
        Zurück</button>
    <br>
    <input type="text" id="searchInput" placeholder="Suche nach Name oder Costumer">

    <br><br>

    <div id="eventTableContainer"></div>

    <table id="eventTable">
        <thead>
            <tr>
                <th onclick="sortEvents('name')">Name</th>
                <th onclick="sortEvents('stat')">Status</th>
                <th onclick="sortEvents('costumer')">Kunde</th>
                <th onclick="sortEvents('start')">Start</th>
                <th onclick="sortEvents('ende')">Ende</th>
                <th>Aktion</th>
            </tr>
        </thead>
        <tbody></tbody> <!-- wichtig -->
    </table>



    <script src="js/event.js"></script>
</body>

</html>
