<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - THW System</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- Header -->
    <header>
        <img src="img/logo.png" alt="THW Logo" style="height:50px;">
        <h1>Förderverein THW Steinau</h1>
    </header>

    <!-- Neuer Benutzer -->
    <h2>Neuen Benutzer erstellen</h2>
    <div class="form-row">
        <label for="newUsername">Benutzername:</label>
        <input type="text" id="newUsername">
    </div>
    <div class="form-row">
        <label for="newRole">Rolle:</label>
        <select id="newRole">
            <option value="user">User</option>
            <option value="admin">Admin</option>
        </select>
    </div>
    <button id="createUserButton">Benutzer erstellen</button>
    <p id="createUserResult"></p>

    <button type="button" onclick="window.location.href='index.html'">Zurück</button>

    <!-- Bestehende Benutzer -->
    <h2>Bestehende Benutzer</h2>

    <!-- Desktop-Tabelle -->
    <div id="desktopTableContainer">
        <table id="userTable">
            <thead>
                <tr>
                    <th>Benutzername</th>
                    <th>Rolle</th>
                    <th>Aktionen</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <!-- Mobile Cards -->
    <div id="userCardContainer" class="mobile-cards"></div>

    <script src="js/user.js"></script>

</body>

</html>
