<!DOCTYPE html>
<html lang="de">

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js"></script>

  <header>

<body data-mode="return">

<div id="cameraContainer" style="width:300px; height:200px; display:none; position:relative;"></div>  <br><br>

  <br><br>

                <tr>
                    <th>Name</th>
                    <th>Spezifikation</th>
                    <th>Kategorie</th>

                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
<div id="rentalTableContainer"></div>

<div id="mobileView" style="display:none;"></div>
  <br><br>
  <p id="result"></p>
